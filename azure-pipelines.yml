trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'azure-service-connection' # You will create this in Azure DevOps
  acrName: 'fastapiacreastus'
  aksCluster: 'fastapi-aks-eastus2'
  resourceGroup: 'fastapi-rg-eastus'
  imageRepository: 'task-api'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: Build
    displayName: 'Build Job'
    steps:
    - task: AzureCLI@2
      displayName: 'Build and Push to ACR'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(acrName)
          docker build -t $(acrName).azurecr.io/$(imageRepository):$(tag) .
          docker push $(acrName).azurecr.io/$(imageRepository):$(tag)
          
          # Also tag and push as latest
          docker tag $(acrName).azurecr.io/$(imageRepository):$(tag) $(acrName).azurecr.io/$(imageRepository):latest
          docker push $(acrName).azurecr.io/$(imageRepository):latest

- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: 'Deploy Job'
    steps:
    - task: AzureCLI@2
      displayName: 'Deploy K8s Manifests'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(resourceGroup) --name $(aksCluster) --overwrite-existing
          
          # Apply manifests
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/fastapi.yaml
          
          # Force deployment restart to pull new image
          kubectl rollout restart deployment fastapi-deployment
